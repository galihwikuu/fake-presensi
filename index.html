<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<title>Presensi Foto</title>
</head>
<body>
<div id="lockScreen">

    <div class="lock-card">

        <div class="lock-logo">
            🔒
        </div>

        <h2>Natra Fake Presence</h2>

        <p>Masukkan PIN untuk melanjutkan</p>

        <div id="pinDots" class="pin-dots">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="pin-pad">

            <button class="pin-btn" data-num="1">1</button>
            <button class="pin-btn" data-num="2">2</button>
            <button class="pin-btn" data-num="3">3</button>

            <button class="pin-btn" data-num="4">4</button>
            <button class="pin-btn" data-num="5">5</button>
            <button class="pin-btn" data-num="6">6</button>

            <button class="pin-btn" data-num="7">7</button>
            <button class="pin-btn" data-num="8">8</button>
            <button class="pin-btn" data-num="9">9</button>

            <button id="pinDelete">⌫</button>
            <button class="pin-btn" data-num="0">0</button>
            <button id="pinEnter">✓</button>

        </div>

        <div id="pinStatus"></div>

    </div>

</div>

<div id="app" style="display:none;">

<header>
  <h1>Natra Fake Presence</h1>
  <p>Create fake presence photo of Natra Aircraft Support in just one-click</p>
</header>

<div class="panel">
  <h2>Data Presensi</h2>
    <div class="field">
        <label for="idSelect">ID Pegawai</label>
        <div class="select-wrap">
        <select id="idSelect">
            <option value="">— Pilih ID —</option>
            <option value="***1008">***1008</option>
            <option value="***8328">***8328</option>
            <option value="***8005">***8005</option>
            <option value="***4514">***4514</option>
            <option value="***0004">***0004</option>
            <option value="***9004">***9004</option>
            <option value="***2009">***2009</option>
            <option value="custom">ID Lainnya…</option>
        </select>
        </div>

        <div class="custom-id-wrap" id="idCustomWrap" style="display:none;">
            <span class="id-prefix">***</span>
            <input type="text" id="idCustom" placeholder="0000" inputmode="numeric" maxlength="4">
        </div>
    </div>

  <div class="field">
    <label for="locSelect">Lokasi</label>
    <div class="select-wrap">
      <select id="locSelect">
        <option value="">— Pilih Lokasi —</option>
        <option value="Tuban, Kuta, Badung, Bali, Nusa Tenggara, 80361, Indonesia">Bandara I Gusti Ngurah Rai, Tuban, Bali</option>
        <option value="Kemayoran, Jakarta Pusat, DKI Jakarta, Indonesia">Bandara Soekarno-Hatta, Jakarta</option>
        <option value="Sukolilo, Surabaya, Jawa Timur, Indonesia">Bandara Juanda, Surabaya</option>
        <option value="Pranti, Sedati, Sidoarjo, Jawa Timur, 61253, Indonesia">Pranti, Sedati, Sidoarjo, Jawa Timur, 61253</option>
        <option value="Segoro Tambak, Sedati, Sidoarjo, Jawa Timur, 61253, Indonesia">Segoro Tambak, Sedati, Sidoarjo, Jawa Timur, 61253</option>
        <option value="custom">Lokasi Lainnya…</option>
      </select>
    </div>
    <input type="text" id="locCustom" placeholder="Masukkan lokasi" style="display:none;">
  </div>

  <div class="field">
      <label for="dateInput">Tanggal Presensi</label>

      <div class="date-wrap">
          <input
              type="text"
              id="dateInput"
              placeholder="Pilih tanggal">
          <span class="date-icon">📅</span>
      </div>
  </div>
</div>



<div class="frame-wrap" id="frameWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="shotImg">
  <img id="uploadSrc" style="display:none;">
  <div class="hint" id="hint">
    <div class="icon">📷</div>
    <div>Tekan <strong>"Buka Kamera"</strong> atau <strong>"Unggah Gambar"</strong> untuk mulai</div>
  </div>
</div>

<div class="btnbar">
    <button id="openOptionBtn" class="primary">
        📤 Unggah Gambar
    </button>

    <button id="backBtn" class="ghost" style="display:none;">
        Kembali
    </button>

    <input
        type="file"
        id="fileInput"
        accept="image/*"
        hidden>
</div>

<div id="optionMenu" class="option-menu">
    <button id="camBtn">
        📷 Ambil Foto
    </button>

    <button id="uploadBtn">
        🖼️ Unggah Gambar
    </button>
</div>

<div class="btnbar">
    <button id="retakeBtn" class="ghost" style="display:none;">
        Ulangi
    </button>

    <button id="downloadBtn" class="primary" style="display:none;">
        Unduh Foto
    </button>
</div>

<div class="status" id="status"></div>
<div class="footer-note">Foto diproses langsung di perangkat — tidak diunggah ke server mana pun.</div>


<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="script.js"></script>

</div>
</body>
</html>
